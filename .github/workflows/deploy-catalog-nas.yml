name: Deploy — Publish to NAS Catalog

on:
  workflow_run:
    workflows: ["Build & Push Control-Plane Image"]
    types: [completed]
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    name: Publicar app no catálogo local do TrueNAS
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on:
      - self-hosted
      - Linux
      - homelab
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5

      - name: Ler versão do app
        id: ver
        run: |
          V=$(grep -E '^version:' ix-dev/stable/lto6-tape/app.yaml | awk '{print $2}')
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Versão: $V"

      - name: Empacotar app renderizado para envio ao NAS
        run: |
          set -euo pipefail
          VER="${{ steps.ver.outputs.version }}"
          STAGE="/tmp/lto6-catalog-stage"
          DEST="$STAGE/trains/community/lto6-tape"
          mkdir -p "$DEST/$VER/templates"

          cp ix-dev/stable/lto6-tape/app.yaml       "$DEST/$VER/"
          cp ix-dev/stable/lto6-tape/questions.yaml  "$DEST/$VER/"
          cp ix-dev/stable/lto6-tape/ix_values.yaml  "$DEST/$VER/"
          cp ix-dev/stable/lto6-tape/CHANGELOG.md    "$DEST/$VER/README.md"
          cp ix-dev/stable/lto6-tape/templates/docker-compose.yaml "$DEST/$VER/templates/"
          cp ix-dev/stable/lto6-tape/item.yaml       "$DEST/"

          python3 -c "
          import json; v='$VER'
          json.dump({v: {'app_version': v, 'healthy': True, 'train': 'community'}},
                    open('$DEST/app_versions.json','w'), indent=2)
          "
          echo "STAGE=$STAGE" >> "$GITHUB_ENV"
          echo "VER=$VER"     >> "$GITHUB_ENV"
          find "$DEST" -type f

      - name: Enviar ao NAS e injetar no catálogo
        run: |
          set -euo pipefail
          # Transfere o pacote via homelab→NAS (padrão de deploy do projeto)
          tar -C "$STAGE" -cf - trains | \
            ssh -o BatchMode=yes -o StrictHostKeyChecking=no homelab@192.168.15.2 \
              "ssh -o BatchMode=yes -o StrictHostKeyChecking=no root@192.168.15.4 \
               'mkdir -p /tmp/lto6-catalog-deploy && tar -xf - -C /tmp/lto6-catalog-deploy'"

          # Injetar no catálogo e sincronizar (comandos executados no NAS)
          ssh -o BatchMode=yes -o StrictHostKeyChecking=no homelab@192.168.15.2 \
            "ssh -o BatchMode=yes -o StrictHostKeyChecking=no root@192.168.15.4 '
              CATALOG=/mnt/.ix-apps/truenas_catalog
              VER=$VER
              SRC=/tmp/lto6-catalog-deploy/trains/community/lto6-tape
              DEST=\$CATALOG/trains/community/lto6-tape

              mkdir -p \$DEST/\$VER/templates
              cp \$SRC/item.yaml            \$DEST/
              cp \$SRC/app_versions.json    \$DEST/
              cp -r \$SRC/\$VER/.           \$DEST/\$VER/

              midclt call catalog.sync 2>/dev/null || true
              echo \"Catálogo sincronizado — lto6-tape \$VER disponível em Discover\"
            '"

      - name: Verificar app visível no catálogo
        run: |
          sleep 12
          ssh -o BatchMode=yes -o StrictHostKeyChecking=no homelab@192.168.15.2 \
            "ssh -o BatchMode=yes -o StrictHostKeyChecking=no root@192.168.15.4 \
             'midclt call catalog.apps 2>/dev/null | python3 -c \"
import json,sys
d=json.load(sys.stdin)
found=any(\"lto6-tape\" in str(v) for v in d.values())
print(\"OK — lto6-tape visível\" if found else \"AVISO — ainda indexando\")
\"'"
